name: Gaming Tunnel Setup (Pinggy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies and Xray
        run: |
          set -e
          echo "📦 Installing dependencies..."
          sudo apt-get update -y
          sudo apt-get install -y unzip wget openssh-client curl

          # --- نصب Xray ---
          if [ ! -f "/usr/local/bin/xray/xray" ]; then
            echo "📥 Downloading Xray Core..."
            wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
            sudo unzip -q -o Xray-linux-64.zip -d /usr/local/bin/xray
            sudo chmod +x /usr/local/bin/xray/xray
            rm -f Xray-linux-64.zip
            echo "✅ Xray Installed."
          else
            echo "✔ Xray is already there."
          fi

      - name: Execute shell script to configure Xray
        run: |
          set -e
          chmod +x xray.sh
          ./xray.sh
          echo "✅ xray.sh executed."

      - name: Show runner public IP (for logs)
        run: |
          echo "================ RUNNER INFO ================"
          echo -n "Runner public IP: "
          curl -s https://api.ipify.org || true
          echo
          echo "============================================"

      # --- Pinggy tunnel (بدون نصب کلاینت) ---
      # این دستور یک تونل روی پورت 8888 (لوکال) می‌سازد و Pinggy یک URL عمومی می‌دهد.
      - name: Start Pinggy Tunnel (extract public URL)
        id: pinggy
        run: |
          set -e

          echo "🚀 Starting Pinggy tunnel to localhost:8888 ..."
          echo "NOTE: if tunnel reconnects, URL may change."

          # Pinggy خروجی می‌دهد؛ ما در فایل ذخیره می‌کنیم تا URL را استخراج کنیم
          # -o StrictHostKeyChecking=no برای اینکه در GH Actions گیر نکند
          # -R0 یعنی خودش یک پورت/دامنه آزاد می‌دهد
          (ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
              -p 443 -T -R0:localhost:8888 free.pinggy.io | tee pinggy.log) &

          # چند ثانیه صبر می‌کنیم تا URL چاپ شود
          for i in $(seq 1 30); do
            if grep -Eo 'https?://[^ ]+' pinggy.log | head -n 1 > pinggy_url.txt; then
              break
            fi
            sleep 1
          done

          echo "--------------- PINGGY LOG (head) ---------------"
          head -n 80 pinggy.log || true
          echo "-------------------------------------------------"

          if [ ! -s pinggy_url.txt ]; then
            echo "❌ Could not detect Pinggy public URL from logs."
            echo "Full log so far:"
            cat pinggy.log || true
            exit 1
          fi

          PINGGY_URL=$(cat pinggy_url.txt | tr -d '\r\n')
          echo "✅ Pinggy Public URL: $PINGGY_URL"
          echo "pinggy_url=$PINGGY_URL" >> $GITHUB_OUTPUT

      - name: Print connection summary
        run: |
          echo "================ SUMMARY ================"
          echo "Pinggy URL: ${{ steps.pinggy.outputs.pinggy_url }}"
          echo "Xray Local: 127.0.0.1:8888"
          echo "If your Xray is WS on path /ws, try:"
          echo "${{ steps.pinggy.outputs.pinggy_url }}/ws"
          echo "======================================="

      - name: Keep the job alive
        run: |
          echo "Tunnel should be active. Keeping the job alive..."
          while true; do sleep 3600; done
