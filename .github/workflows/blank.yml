name: Cloudflare Temporary Tunnel Test # اسمش رو عوض کن به چیزی که مربوطه

on: 
  workflow_dispatch: # دستی اجراش کن که سورپرایز نشی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- مرحله ۱: دریافت توکن LocalXpose از Secrets ---
      - name: Get LocalXpose Token
        id: get_token
        env:
          LOCALXPOSE_TOKEN_SECRET: ${{ secrets.LOCALXPOSE_TOKEN }}
        run: |
          if [ -z "$LOCALXPOSE_TOKEN_SECRET" ]; then
            echo "❌ Error: LOCALXPOSE_TOKEN secret is not set. Please configure it in GitHub repository secrets."
            exit 1
          fi
          echo "✅ LocalXpose Token received."
          echo "::set-output name=token::$LOCALXPOSE_TOKEN_SECRET"

      - name: Install dependencies and Xray
        run: |
          echo "📦 Installing dependencies (unzip, wget)..."
          sudo apt update && sudo apt install -y unzip  wget > /dev/null 2>&1

          # --- ۲. نصب Xray (نسخه 64 بیتی بهینه) ---
          if [ ! -f "/usr/local/bin/xray/xray" ]; then # مسیر دقیق فایل اجرایی رو چک کن
              echo "📥 Downloading Xray Core..."
              wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
              if [ $? -ne 0 ]; then echo "❌ Failed to download Xray Core."; exit 1; fi
              sudo unzip -q -o Xray-linux-64.zip -d /usr/local/bin/xray
              if [ $? -ne 0 ]; then echo "❌ Failed to unzip Xray Core."; exit 1; fi
              sudo chmod +x /usr/local/bin/xray/xray
              ls -al /usr/local/bin/xray/xray # چک کردن فایل اجرایی
              rm Xray-linux-64.zip
              echo "✅ Xray Installed."
          else
              echo "✔ Xray is already there."
          fi

      - name: Execute shell script
        run: chmod +x xray.sh && ./xray.sh

      - name: Install LocalXpose
        run: |
          echo "📦 Downloading LocalXpose..."
          wget -q https://api.localxpose.io/api/v1/download/linux/amd64 -O localxpose.tar.gz
          if [ $? -ne 0 ]; then
            echo "❌ Failed to download LocalXpose. Please check the URL and network connection."
            exit 1
          fi
          echo "✅ Downloaded successfully."

          echo "📦 Extracting LocalXpose..."
          tar -xzf localxpose.tar.gz -C /usr/local/bin/
          if [ $? -ne 0 ]; then
            echo "❌ Failed to extract LocalXpose. The downloaded file might be corrupted or the tar command failed."
            ls -l localxpose.tar.gz
            exit 1
          fi
          
          # مدیریت پوشه احتمالی
          if [ -d "/usr/local/bin/localxpose" ]; then
            echo "Moving localxpose executable from directory..."
            mv /usr/local/bin/localxpose /usr/local/bin/localxpose_temp
            rm -rf /usr/local/bin/localxpose
            mv /usr/local/bin/localxpose_temp /usr/local/bin/localxpose
          fi
          
          if [ ! -f "/usr/local/bin/localxpose" ]; then
             echo "❌ LocalXpose executable not found at /usr/local/bin/localxpose after extraction."
             exit 1
          fi
          
          rm localxpose.tar.gz 
          echo "✅ LocalXpose installed and verified at /usr/local/bin/localxpose."

      - name: Login to LocalXpose
        run: |
          echo "🔑 Logging in to LocalXpose..."
          echo "${{ steps.get_token.outputs.token }}" | /usr/local/bin/localxpose login --token -
          if [ $? -ne 0 ]; then
            echo "❌ Failed to login to LocalXpose. Please check your LOCALXPOSE_TOKEN."
            exit 1
          fi
          echo "✅ Logged in to LocalXpose."

      # --- مرحله ۴: اجرای تونل LocalXpose برای Xray ---
      - name: Run LocalXpose Tunnel for Xray
        run: |
          echo "🚀 Starting LocalXpose tunnel for VLESS TCP (port 8889)..."
          TUNNEL_COMMAND="/usr/local/bin/localxpose tunnel tcp --hostname your-game-domain.com --to 127.0.0.1:8889"
          echo "Executing: $TUNNEL_COMMAND"
          $TUNNEL_COMMAND &
          sleep 15 
          echo "--------------------------------------------------------------"
          echo "Tunnel command executed. Check your LocalXpose dashboard or"
          echo "try accessing your chosen hostname (e.g., your-game-domain.com.auto.trylocalxpose.com if auto-assigned)."
          echo "The tunnel targets 127.0.0.1:8889 (Xray VLESS TCP)."
          echo "--------------------------------------------------------------"
          echo "Keeping the job alive to maintain the tunnel..."
          while true; do sleep 3600; done
