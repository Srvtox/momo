name: Cloudflare Temporary Tunnel Test

on: 
  workflow_dispatch: # دستی اجراش کن که سورپرایز نشی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Install dependencies and Xray
        run: |
          echo "📦 Installing dependencies (unzip, wget)..."
          sudo apt update && sudo apt install -y unzip  wget > /dev/null 2>&1

          # --- ۲. نصب Xray (نسخه 64 بیتی بهینه) ---
          if [ ! -f "/usr/local/bin/xray" ]; then
              echo "📥 Downloading Xray Core..."
              wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
              sudo unzip -q -o Xray-linux-64.zip -d /usr/local/bin/xray
              sudo chmod +x /usr/local/bin/xray/xray
              ls -al /usr/local/bin/xray
              rm Xray-linux-64.zip
              echo "✅ Xray Installed."
          else
              echo "✔ Xray is already there."
          fi

      - name: Execute shell script
        run: chmod +x xray.sh && ./xray.sh

      - name: Install and Login LocalXpose
        run: |
          echo "📦 Installing LocalXpose..."
          wget -q https://api.localxpose.io/api/v1/download/linux/amd64 -O localxpose.tar.gz
          tar -xzf localxpose.tar.gz -C /usr/local/bin/
          rm localxpose.tar.gz
          echo "✅ LocalXpose installed."

          echo "🔑 Logging in to LocalXpose..."
          # استفاده از توکن دریافتی از مرحله قبل
          echo "$LOCALXPOSE_TOKEN_SECRET" | /usr/local/bin/localxpose login --token -
          echo "✅ Logged in to LocalXpose."
        env:
          LOCALXPOSE_TOKEN_SECRET: ${{ steps.get_token.outputs.token }}

      # --- مرحله ۴: اجرای تونل LocalXpose برای Xray ---
      - name: Run LocalXpose Tunnel for Xray
        run: |
          echo "🚀 Starting LocalXpose tunnel for VLESS TCP (port 8889)..."
          # !!! حتماً your-game-domain.com رو به دامنه دلخواه یا تستی خودت تغییر بده !!!
          # اگه دامنه نداری، LocalXpose یه دامنه موقت بهت می‌ده.
          TUNNEL_COMMAND="/usr/local/bin/localxpose tunnel tcp --hostname your-game-domain.com --to 127.0.0.1:8889"
          echo "Executing: $TUNNEL_COMMAND"
          
          # اجرای تونل در پس‌زمینه
          $TUNNEL_COMMAND &

          # صبر برای اینکه تونل برقرار بشه و URL نمایش داده بشه
          sleep 15 

          # تلاش برای پیدا کردن URL تونل (این قسمت ممکنه دقیق نباشه چون LocalXpose URL رو مستقیم چاپ نمی‌کنه)
          # بهترین راه اینه که خودت آدرس رو چک کنی یا از یک روش دیگه برای گرفتن URL استفاده کنی.
          # ولی فعلا سعی می‌کنیم یه چیزی نمایش بدیم:
          echo "--------------------------------------------------------------"
          echo "Tunnel command executed. Check your LocalXpose dashboard or"
          echo "try accessing your chosen hostname (e.g., your-game-domain.com.auto.trylocalxpose.com if auto-assigned)."
          echo "The tunnel targets 127.0.0.1:8889 (Xray VLESS TCP)."
          echo "--------------------------------------------------------------"

          # اجرای نامحدود برای نگه داشتن تسک (مثل workflow قبلی)
          echo "Keeping the job alive to maintain the tunnel..."
          while true; do sleep 3600; done

