name: Cloudflare Temporary Tunnel Test # اسمش رو عوض کن به چیزی که مربوطه

on: 
  workflow_dispatch: # دستی اجراش کن که سورپرایز نشی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- مرحله ۱: دریافت توکن LocalXpose از Secrets ---
      - name: Get LocalXpose Token
        id: get_token
        env:
          LOCALXPOSE_TOKEN_SECRET: ${{ secrets.LOCALXPOSE_TOKEN }}
        run: |
          if [ -z "$LOCALXPOSE_TOKEN_SECRET" ]; then
            echo "❌ Error: LOCALXPOSE_TOKEN secret is not set. Please configure it in GitHub repository secrets."
            exit 1
          fi
          echo "✅ LocalXpose Token received."
          echo "::set-output name=token::$LOCALXPOSE_TOKEN_SECRET"

      - name: Install dependencies and Xray
        run: |
          echo "📦 Installing dependencies (unzip, wget)..."
          sudo apt update && sudo apt install -y unzip  wget > /dev/null 2>&1

          # --- ۲. نصب Xray (نسخه 64 بیتی بهینه) ---
          if [ ! -f "/usr/local/bin/xray/xray" ]; then # مسیر دقیق فایل اجرایی رو چک کن
              echo "📥 Downloading Xray Core..."
              wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
              if [ $? -ne 0 ]; then echo "❌ Failed to download Xray Core."; exit 1; fi
              sudo unzip -q -o Xray-linux-64.zip -d /usr/local/bin/xray
              if [ $? -ne 0 ]; then echo "❌ Failed to unzip Xray Core."; exit 1; fi
              sudo chmod +x /usr/local/bin/xray/xray
              ls -al /usr/local/bin/xray/xray # چک کردن فایل اجرایی
              rm Xray-linux-64.zip
              echo "✅ Xray Installed."
          else
              echo "✔ Xray is already there."
          fi

      - name: Execute shell script
        run: chmod +x xray.sh && ./xray.sh
      # --- مرحله ۳: استفاده از LocalXpose Action ---
      - name: Install and Run Cloudflare Tunnel
        run: |
          # دانلود کردن کلودفلر (نسخه لینوکس)
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          # اجرای تونل به صورت موقت و استخراج URL
          # این قسمت یکم جادویی کار می‌کنه چون خروجی رو توی لاگ نشون میده
          echo "Starting Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:8889 --logfile tunnel.log &
          
          # یه چند ثانیه صبر کنیم که کلودفلر بتونه با دنیا ارتباط برقرار کنه
          sleep 10
          
          # حالا بریم دنبال اون آدرس خوشگله بگردیم که به .trycloudflare.com ختم میشه
          TUNNEL_URL=$(grep -o 'https://[-a-z0-9.]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          echo "------------------------------------------------"
          echo "بفرما! آدرس تونل شما با احترام تقدیم می‌شود:"
          echo "URL: $TUNNEL_URL"
          echo "------------------------------------------------"
          
          # این مرحله رو میذارم که رانر سریع بسته نشه و بتونی تست کنی
          # هشدار: گیت‌هاب ممکنه بعد از مدتی رانر رو به خاطر بیکار بودن ببنده
          echo "Tunnel will be active for 15 minutes. Go wild!"

      - name: Keep the job alive
        run: |
          echo "Tunnel is active. Keeping the job alive..."
          while true; do sleep 3600; done
